name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - frontend/mabuntle-web/**
      - .github/workflows/deploy-frontend.yml

permissions:
  contents: read

jobs:
  deploy:
    name: Cloudflare Pages (${{ matrix.app }})
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: client
            build_script: build:client:cloudflare
            output_dir: dist/mabuntle-client/browser
            project_var: CLOUDFLARE_PAGES_PROJECT_CLIENT
          - app: seller
            build_script: build:seller:cloudflare
            output_dir: dist/mabuntle-seller/browser
            project_var: CLOUDFLARE_PAGES_PROJECT_SELLER
          - app: admin
            build_script: build:admin:cloudflare
            output_dir: dist/mabuntle-admin/browser
            project_var: CLOUDFLARE_PAGES_PROJECT_ADMIN

    defaults:
      run:
        working-directory: frontend/mabuntle-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/mabuntle-web/package-lock.json

      - name: Validate deployment configuration
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars[matrix.project_var] }}
          MABUNTLE_API_BASE_URL: ${{ vars.MABUNTLE_API_BASE_URL || vars.SWYFTLY_API_BASE_URL }}
        run: |
          missing=0
          require() {
            if [ -z "${!1:-}" ]; then
              echo "::error::$1 is required for Cloudflare Pages deployment"
              missing=1
            fi
          }

          require CLOUDFLARE_API_TOKEN
          require CLOUDFLARE_ACCOUNT_ID
          require CLOUDFLARE_PAGES_PROJECT_NAME
          require MABUNTLE_API_BASE_URL

          if ! [[ "$MABUNTLE_API_BASE_URL" =~ ^https:// ]]; then
            echo "::error::MABUNTLE_API_BASE_URL must be an HTTPS API origin"
            missing=1
          fi

          exit "$missing"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test:ci

      - name: Build static Cloudflare output
        env:
          MABUNTLE_API_BASE_URL: ${{ vars.MABUNTLE_API_BASE_URL || vars.SWYFTLY_API_BASE_URL }}
        run: npm run ${{ matrix.build_script }}

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars[matrix.project_var] }}
        run: npx --yes wrangler pages deploy "${{ matrix.output_dir }}" --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME" --branch "$GITHUB_REF_NAME"
