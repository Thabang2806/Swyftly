services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mabuntle-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mabuntle}
      POSTGRES_USER: ${POSTGRES_USER:-mabuntle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mabuntle_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - mabuntle-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mabuntle} -d ${POSTGRES_DB:-mabuntle}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mabuntle-postgres-data:
