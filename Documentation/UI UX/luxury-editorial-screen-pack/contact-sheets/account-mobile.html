<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mabuntle account mobile contact sheet</title>
<style>
body{margin:0;padding:28px;background:#f7f1eb;color:#181114;font-family:Segoe UI,Arial,sans-serif}
h1{font-family:Georgia,serif;font-weight:400;letter-spacing:.03em;margin:0 0 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
article{background:#fffaf5;border:1px solid #d8c2ad;padding:10px;box-shadow:0 16px 40px rgba(42,20,37,.1)}
img{display:block;width:100%;height:auto;border:1px solid rgba(216,194,173,.7)}
strong{display:block;margin-top:8px;font-size:11px;letter-spacing:.08em;text-transform:uppercase}
</style>
</head>
<body>
<h1>Mabuntle account - mobile</h1>
<div class="grid"><article><img src='../mobile/account.png' alt='/account'><strong>/account</strong></article>
<article><img src='../mobile/account-orders.png' alt='/account/orders'><strong>/account/orders</strong></article>
<article><img src='../mobile/account-orders-orderid.png' alt='/account/orders/:orderId'><strong>/account/orders/:orderId</strong></article>
<article><img src='../mobile/account-returns.png' alt='/account/returns'><strong>/account/returns</strong></article>
<article><img src='../mobile/account-returns-returnrequestid.png' alt='/account/returns/:returnRequestId'><strong>/account/returns/:returnRequestId</strong></article>
<article><img src='../mobile/account-wishlist.png' alt='/account/wishlist'><strong>/account/wishlist</strong></article>
<article><img src='../mobile/account-reviews.png' alt='/account/reviews'><strong>/account/reviews</strong></article>
<article><img src='../mobile/account-notifications.png' alt='/account/notifications'><strong>/account/notifications</strong></article>
<article><img src='../mobile/account-settings.png' alt='/account/settings'><strong>/account/settings</strong></article>
<article><img src='../mobile/account-disputes.png' alt='/account/disputes'><strong>/account/disputes</strong></article>
<article><img src='../mobile/account-support.png' alt='/account/support'><strong>/account/support</strong></article>
<article><img src='../mobile/account-support-ticketid.png' alt='/account/support/:ticketId'><strong>/account/support/:ticketId</strong></article></div>
</body>
</html>
