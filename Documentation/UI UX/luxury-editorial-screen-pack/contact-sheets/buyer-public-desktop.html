<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Swyftly buyer-public desktop contact sheet</title>
<style>
body{margin:0;padding:28px;background:#f7f1eb;color:#181114;font-family:Segoe UI,Arial,sans-serif}
h1{font-family:Georgia,serif;font-weight:400;letter-spacing:.03em;margin:0 0 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:18px}
article{background:#fffaf5;border:1px solid #d8c2ad;padding:10px;box-shadow:0 16px 40px rgba(42,20,37,.1)}
img{display:block;width:100%;height:auto;border:1px solid rgba(216,194,173,.7)}
strong{display:block;margin-top:8px;font-size:11px;letter-spacing:.08em;text-transform:uppercase}
</style>
</head>
<body>
<h1>Swyftly buyer-public - desktop</h1>
<div class="grid"><article><img src='../desktop/home.png' alt='/'><strong>/</strong></article>
<article><img src='../desktop/shop.png' alt='/shop'><strong>/shop</strong></article>
<article><img src='../desktop/cart.png' alt='/cart'><strong>/cart</strong></article>
<article><img src='../desktop/assistant.png' alt='/assistant'><strong>/assistant</strong></article>
<article><img src='../desktop/visual-search.png' alt='/visual-search'><strong>/visual-search</strong></article>
<article><img src='../desktop/category-slug.png' alt='/category/:slug'><strong>/category/:slug</strong></article>
<article><img src='../desktop/product-slug.png' alt='/product/:slug'><strong>/product/:slug</strong></article>
<article><img src='../desktop/seller-storeslug.png' alt='/seller/:storeSlug'><strong>/seller/:storeSlug</strong></article></div>
</body>
</html>
