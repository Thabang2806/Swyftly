<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mabuntle auth desktop contact sheet</title>
<style>
body{margin:0;padding:28px;background:#f7f1eb;color:#181114;font-family:Segoe UI,Arial,sans-serif}
h1{font-family:Georgia,serif;font-weight:400;letter-spacing:.03em;margin:0 0 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:18px}
article{background:#fffaf5;border:1px solid #d8c2ad;padding:10px;box-shadow:0 16px 40px rgba(42,20,37,.1)}
img{display:block;width:100%;height:auto;border:1px solid rgba(216,194,173,.7)}
strong{display:block;margin-top:8px;font-size:11px;letter-spacing:.08em;text-transform:uppercase}
</style>
</head>
<body>
<h1>Mabuntle auth - desktop</h1>
<div class="grid"><article><img src='../desktop/login.png' alt='/login'><strong>/login</strong></article>
<article><img src='../desktop/register-buyer.png' alt='/register/buyer'><strong>/register/buyer</strong></article>
<article><img src='../desktop/register-seller.png' alt='/register/seller'><strong>/register/seller</strong></article>
<article><img src='../desktop/access-denied.png' alt='/access-denied'><strong>/access-denied</strong></article></div>
</body>
</html>
