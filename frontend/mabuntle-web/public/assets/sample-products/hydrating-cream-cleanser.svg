  <title id="title">Hydrating Cream Cleanser</title>
  <desc id="desc">Editorial product illustration for a hydrating cream cleanser.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf4"/>
