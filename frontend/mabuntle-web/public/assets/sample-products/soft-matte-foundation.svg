  <rect width="900" height="1200" fill="url(#bg)"/>
  <rect x="98" y="98" width="704" height="1004" rx="44" fill="#fffaf4" opacity="0.73"/>
  <rect x="382" y="258" width="136" height="76" rx="18" fill="#3d102b"/>
  <rect x="324" y="336" width="252" height="524" rx="52" fill="url(#bottle)"/>
