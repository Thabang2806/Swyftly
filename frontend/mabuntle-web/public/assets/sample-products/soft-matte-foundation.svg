  <text x="450" y="606" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#6f415d">Matte</text>
  <text x="450" y="1038" text-anchor="middle" font-family="Georgia, serif" font-size="40" fill="#3d102b">Soft matte foundation</text>
