<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Soft Matte Foundation</title>
  <desc id="desc">Editorial product illustration for soft matte foundation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf4"/>
      <stop offset="0.58" stop-color="#e3bd88"/>
      <stop offset="1" stop-color="#3d102b"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d99f6d"/>
